<head>

<body>

  <!-- GLOBAL HEADER (dùng chung với index.html)
       Segment bar "Trang Chủ Cửa Hàng Giáo Dục | Thoát" + Apple global nav. -->

  <div class="search-backdrop" id="search-backdrop"></div>

  <!-- ── FE-2.1: STICKY NAVIGATION ──────────────────────────────────────
    Thanh bám dính khi cuộn: tên "iPad Pro" bên trái, giá "Từ 27.199.000đ" ở giữa,
    thanh trạng thái giao hàng (icon + "Vận chuyển miễn phí") bên phải với paddle nav.
    Bên dưới sticky bar là header tĩnh: H1 "Mua iPad Pro", badge giáo dục, link Trade In.
  ─────────────────────────────────────────────────────────────────────── -->

        <div class="sticky-bar-container">
            <div class="sticky-bar-main">
                <a class="sticky-bar-title" href="https://www.apple.com/vn/ipad-pro">iPad Pro</a>
                <div class="sticky-bar-price">
                    Từ <span>27.199.000đ</span>
                </div>
            </div>
        </div>
        <div class="sticky-bar-shipping-wrapper">
            <div class="sticky-bar-container sticky-bar-shipping">

                <span>Vận chuyển miễn phí</span>
            </div>
        </div>

  <main id="main-content">

    <div class="rf-bfe-header-wrapper">
      <!-- TODO: H1 "Mua iPad Pro" + giá + badge "Ưu Đãi Tiết Kiệm Cho Ngành Giáo Dục"
                 + logo Apple Intelligence + link "Nhận 900.000đ–24.100.000đ khi đổi" -->
    </div>

    <!-- ── FE-2.2 + FE-2.3: STICKY IMAGE GALLERY & PRODUCT OPTIONS ─────
      Layout 2 cột bám dính: cột trái là gallery ảnh (FE-2.2), cột phải là
      các bước chọn cấu hình tuần tự + summary box (FE-2.3).
    ─────────────────────────────────────────────────────────────────────── -->
    <div class="rf-bfe">
      <div class="rf-bfe-main">

        <!-- FE-2.2: Cột trái — Sticky Image Gallery
             Gallery 2 ảnh (iPad Pro 11" & 13") với dot nav và paddle nav Prev/Next.
             Cột này bám dính (position sticky) khi người dùng cuộn qua cột phải. -->
        <div class="rf-bfe-column-left">
          <!-- TODO: .rf-bfe-gallery-container > .rc-inline-gallery -->
        </div>

        <!-- FE-2.3: Cột phải — Product Options Layout
             Các bước chọn cấu hình hiển thị tuần tự; bước sau bị khoá đến khi chọn xong bước trước.
             Mỗi bước gồm: tiêu đề (eyebrow), danh sách radio option + giá, và help link. -->
        <div class="rf-bfe-column-right">
          <div class="rf-bfe-selectionarea">

            <!-- Bước 1 — Phiên bản: 11 inch (từ 27.199.000đ) / 13 inch (từ 37.199.000đ) -->
            <div class="rf-bfe-step" data-step="dimensionScreensize">
              <!-- TODO -->
            </div>

            <!-- Bước 2 — Màu: Đen Không Gian / Bạc (color swatch tròn) -->
            <div class="rf-bfe-step" data-step="dimensionColor">
              <!-- TODO -->
            </div>

            <!-- Bước 3 — Dung lượng, bộ nhớ, chip:
                 256GB–2TB, Bộ nhớ 12–16GB, Chip M5 CPU/GPU các lõi, giá từ 27.199.000đ–55.199.000đ -->
            <div class="rf-bfe-step" data-step="dimensionCapacity">
              <!-- TODO -->
            </div>

            <!-- Bước 4 — Kính màn hình: Tiêu chuẩn / Nano-texture (chỉ có ở 1TB–2TB) -->
            <div class="rf-bfe-step" data-step="dimensionFinish">
              <!-- TODO -->
            </div>

            <!-- Bước 5 — Kết nối: Wi-Fi / Wi-Fi + Cellular -->
            <div class="rf-bfe-step" data-step="dimensionConnection">
              <!-- TODO -->
            </div>

            <!-- Bước 6 — Khắc: Thêm Chi Tiết Khắc (Miễn Phí) / Không khắc -->
            <div class="rf-bfe-step" data-step="engraving">
              <!-- TODO -->
            </div>

            <!-- Bước 7 — Apple Pencil: Pro (3.168.000đ) / USB-C (1.885.000đ) / Không -->
            <div class="rf-bfe-step" id="acc_pencil">
              <!-- TODO -->
            </div>

            <!-- Bước 8 — Bàn phím: Magic Keyboard 11" (7.602.000đ) / 13" (9.068.000đ) / Không -->
            <div class="rf-bfe-step" id="acc_keyboard">
              <!-- TODO -->
            </div>

            <!-- Bước 9 — Apple Trade In: Đổi cũ lấy 900.000đ–24.100.000đ / Không đổi -->
            <div class="rf-bfe-step rf-bfe-tradeup">
              <!-- TODO -->
            </div>

            <!-- Bước 10 — AppleCare+: Thêm (3.799.000đ, badge giáo dục) / Không -->
            <div class="rf-bfe-step rf-bfe-applecare-options">
              <!-- TODO -->
            </div>

            <!-- Summary box: tên SP + giá tổng + nút "Tiếp tục" + icon yêu thích (trái tim) -->
            <div class="rf-bfe-summary">
              <!-- TODO -->
            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- ── FE-2.4: WHAT'S IN THE BOX ───────────────────────────────────
      H2 "Trong hộp có gì" + danh sách ảnh + nhãn sản phẩm đi kèm:
      iPad Pro, Cáp Sạc USB-C, Bộ Tiếp Hợp Nguồn USB-C 20W.
    ─────────────────────────────────────────────────────────────────────── -->
    <section id="section-witb" class="section-witb">
      <!-- TODO: #buyflow-witb > .rc-witb-items -->
    </section>

    <!-- ── FE-2.5 + FE-2.6: FORM THÔNG TIN KHÁCH HÀNG ─────────────────
      Tính năng bổ sung (không có trên trang Apple gốc).
      HTML/CSS (FE-2.5): tiêu đề, field Họ tên + Số điện thoại, nút "Gửi Thông Tin".
      JS Validate (FE-2.6): không rỗng, số điện thoại 10 chữ số bắt đầu bằng 0.
    ─────────────────────────────────────────────────────────────────────── -->
    <section id="section-customer-form" class="section-customer-form">
      <!-- TODO: .customer-form > .form-group (label + input + .error-message) -->
    </section>

    <!-- ── FE-2.7: CÂU HỎI THƯỜNG GẶP ────────────────────────────────
      Accordion "Câu Hỏi Thường Gặp" với 5 câu hỏi lồng nhau:
      Apple Pencil tương thích, Bàn phím tương thích, Kính màn hình, SIM, AppleCare+.
    ─────────────────────────────────────────────────────────────────────── -->
    <section id="section-faq" class="section-faq">
      <!-- TODO: #buyflow-community-app > .rc-accordion -->
    </section>

    <!-- Sticky Chat Button (góc phải, hiện sau khi cuộn)
         Nút tròn + text "Bạn có thêm câu hỏi nào nữa không?" + link "Hỏi Chuyên Gia iPad". -->
    <div class="rs-sticky-chat">
      <!-- TODO -->
    </div>
